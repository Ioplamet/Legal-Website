{% extends "base.html" %}
{% block title %}404 — Страница не найдена{% endblock %}

{% block content %}
<section class="bg-surface min-h-[80vh] flex items-center">
  <div class="max-w-6xl mx-auto px-6 py-24 w-full">
    <div class="max-w-lg">
      <p class="text-gold text-xs font-semibold tracking-widest2 uppercase mb-4">Ошибка 404</p>
      <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tight mb-6 leading-none">
        Страница<br/>не найдена
      </h1>
      <p class="text-gray-400 text-base leading-relaxed mb-10">
        Возможно, она была удалена или вы перешли по устаревшей ссылке.
        Вернитесь на главную — там есть всё необходимое.
      </p>
      <div class="flex flex-wrap gap-4">
        <a href="/"
           class="inline-flex items-center gap-2 bg-gold hover:bg-gold-d text-white font-semibold text-sm px-7 py-3.5 transition-colors">
          На главную
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
          </svg>
        </a>
        <a href="/#contact"
           class="inline-flex items-center gap-2 border border-gray-600 hover:border-gray-400 text-gray-300 hover:text-white font-semibold text-sm px-7 py-3.5 transition-colors">
          Связаться с нами
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
